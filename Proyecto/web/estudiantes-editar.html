<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar estudiante - FCAD UNER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/estudiantes-editar.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4 d-flex justify-content-between align-items-center">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
    <a href="#" id="logout-link" class="text-white small">Salir</a>
  </header>
  <div class="fcad-contenedor-principal">
    <nav class="fcad-nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="inscripciones.html">Inscripciones</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="cursos.html">Cursos</a></li>
      </ul>
    </nav>
    <main class="fcad-main p-4">
      <h2 class="h4 mb-3">Editar estudiante</h2>
      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>
      <form id="form" style="max-width: 640px;">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="documento">Documento</label>
            <input class="form-control" id="documento" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label" for="fecha_nacimiento">Fecha de nacimiento</label>
            <input type="date" class="form-control" id="fecha_nacimiento" required>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="apellido">Apellido</label>
            <input class="form-control" id="apellido" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label" for="nombres">Nombres</label>
            <input class="form-control" id="nombres" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" href="estudiantes.html">Volver</a>
      </form>
    </main>
  </div>
</body>
</html>
