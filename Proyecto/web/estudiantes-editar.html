    <main class="fcad-main">
      
      <header class="main-content-header mb-4">
        <h2 class="h3 fw-bold m-0">Editar estudiante</h2>
        <p class="text-muted mt-1">Modificá los datos personales del alumno en el sistema.</p>
      </header>

      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>

      
        <form id="form">
          
          <div class="row g-4 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="documento">Documento</label>
              <input type="text" class="form-control modern-input" id="documento" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="fecha_nacimiento">Fecha de nacimiento</label>
              <input type="date" class="form-control modern-input" id="fecha_nacimiento" required>
            </div>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="apellido">Apellido</label>
              <input type="text" class="form-control modern-input" id="apellido" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="nombres">Nombres</label>
              <input type="text" class="form-control modern-input" id="nombres" required>
            </div>
          </div>

          <div class="mb-5">
            <label class="form-label fw-bold text-muted small text-uppercase" for="email">Email</label>
            <input type="email" class="form-control modern-input" id="email" required>
          </div>

          <div class="d-flex flex-wrap gap-3 pt-4 border-top">
            <button type="submit" class="btn btn-modern-primary d-flex align-items-center justify-content-center gap-2 px-4">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
              Guardar cambios
            </button>
            <a class="btn btn-modern-outline d-flex align-items-center gap-2 px-4" href="estudiantes.html">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              Cancelar
            </a>
          </div>

        </form>


    </main>
