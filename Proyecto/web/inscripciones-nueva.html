              Estudiantes

              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
              Cursos
            </a>
          </li>
        </ul>
      </div>
      
      <div class="sidebar-footer">
        <a href="#" id="logout-link" class="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Salir
        </a>
      </div>

    <main class="fcad-main d-flex flex-column">
      
      <header class="main-content-header mb-4">
        <h2 class="h3 fw-bold m-0">Nueva inscripción</h2>
        <p class="text-muted mt-1">Completá los datos para registrar a un alumno en una cursada.</p>
      </header>

      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>

      <form id="form" class="flex-grow-1 d-flex flex-column">
        
        <div class="row g-5 mb-4 flex-grow-1 align-items-start">
          
          <div class="col-lg-6">
            <div class="mb-4">
              <label class="form-label fw-bold text-muted small text-uppercase" for="id_curso">1. Seleccionar Curso</label>
              <select class="form-select modern-input" id="id_curso" required></select>
            </div>

            <div id="curso-info" class="card bg-cursos-card mb-4 d-none shadow-sm h-auto" style="border-radius: 16px !important;">
              <div class="card-body py-4 px-4">
                <h6 class="card-title mb-3 fw-bold fs-5 text-dark" id="curso-info-nombre"></h6>
                
                <div class="row small mb-2 text-muted">
                  <div class="col-sm-6 mb-2 mb-sm-0"><strong>Fecha de Inicio:</strong> <span class="text-dark" id="curso-info-inicio"></span></div>
                  <div class="col-sm-6"><strong>Horas:</strong> <span class="text-dark" id="curso-info-horas"></span></div>
                </div>
                
                <div class="row small mb-3 text-muted">
                  <div class="col-sm-6 mb-2 mb-sm-0"><strong>Cupo:</strong> <span class="text-dark" id="curso-info-cupo"></span></div>
                  <div class="col-sm-6"><strong>Estado:</strong> <span id="curso-info-estado" class="badge"></span></div>
                </div>
                
                <div class="border-top pt-3 mt-2 small">
                  <strong class="text-dark">Descripción:</strong>
                  <p class="mb-0 text-muted mt-1" id="curso-info-descripcion"></p>
                </div>
                
                <div id="curso-warning" class="alert alert-warning py-2 px-3 small d-none mb-0 mt-3 border-0 rounded-3" role="alert"></div>
              </div>
            </div>
          </div> 

          <div class="col-lg-6">
            <div class="mb-4">
              <label class="form-label fw-bold text-muted small text-uppercase" for="id_estudiante">2. Seleccionar Estudiante</label>
              <select class="form-select modern-input" id="id_estudiante" required></select>
            </div>

            <div id="estudiante-info" class="card bg-estudiantes-card mb-4 d-none shadow-sm h-auto" style="border-radius: 16px !important;">
              <div class="card-body py-4 px-4">
                <h6 class="card-title mb-3 fw-bold fs-5" id="estudiante-info-nombre"></h6>
                
                <div class="row small mb-2 opacity-75">
                  <div class="col-sm-6 mb-2 mb-sm-0"><strong class="text-dark">Documento:</strong> <span class="text-dark fw-medium" id="estudiante-info-documento"></span></div>
                  <div class="col-sm-6"><strong class="text-dark">Email:</strong> <span class="text-dark fw-medium" id="estudiante-info-email"></span></div>
                </div>
                
                <div class="row small opacity-75">
                  <div class="col-sm-12"><strong class="text-dark">Fecha de Nacimiento:</strong> <span class="text-dark fw-medium" id="estudiante-info-fecha-nac"></span></div>
                </div>
              </div>
            </div>
          </div> 

        </div> <div class="d-flex gap-3 pt-4 border-top mt-auto">
          <button type="submit" id="btn-submit" class="btn btn-modern-primary d-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            Confirmar Inscripción
          </button>
          <a class="btn btn-modern-outline d-flex align-items-center gap-2" href="inscripciones.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Cancelar
          </a>
        </div>

      </form>
    </main>
  </div>
</body>
</html>
