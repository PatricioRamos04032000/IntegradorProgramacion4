<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva inscripción - FCAD UNER</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/inscripciones-nueva.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4 d-flex justify-content-between align-items-center">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
    <a href="#" id="logout-link" class="text-white small">Salir</a>
  </header>
  <div class="fcad-contenedor-principal">
    <nav class="fcad-nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="inscripciones.html">Inscripciones</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="cursos.html">Cursos</a></li>
      </ul>
    </nav>
    <main class="fcad-main p-4">
      <h2 class="h4 mb-3">Nueva inscripción</h2>
      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>
      <form id="form" style="max-width: 520px;">
        <div class="mb-3">
          <label class="form-label" for="id_curso">Curso</label>
          <select class="form-select" id="id_curso" required></select>
        </div>

        <div id="curso-info" class="card bg-cursos-card mb-3 d-none">
          <div class="card-body py-2 px-3">
            <h6 class="card-title mb-2 fw-bold" id="curso-info-nombre" style="color: var(--color-accent);"></h6>
            <div class="row small mb-1">
              <div class="col-sm-6"><strong>Fecha de Inicio:</strong> <span id="curso-info-inicio"></span></div>
              <div class="col-sm-6"><strong>Horas:</strong> <span id="curso-info-horas"></span></div>
            </div>
            <div class="row small mb-2">
              <div class="col-sm-6"><strong>Cupo:</strong> <span id="curso-info-cupo"></span></div>
              <div class="col-sm-6"><strong>Estado:</strong> <span id="curso-info-estado" class="badge"></span></div>
            </div>
            <div class="border-top pt-1 mt-1 small">
              <strong>Descripción:</strong>
              <p class="mb-0 text-muted" id="curso-info-descripcion"></p>
            </div>
            <div id="curso-warning" class="alert alert-warning py-1 px-2 small d-none mb-0 mt-2" role="alert"></div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="id_estudiante">Estudiante</label>
          <select class="form-select" id="id_estudiante" required></select>
        </div>

        <div id="estudiante-info" class="card bg-estudiantes-card mb-3 d-none">
          <div class="card-body py-2 px-3">
            <h6 class="card-title mb-2 fw-bold" id="estudiante-info-nombre" style="color: hsl(168, 55%, 35%);"></h6>
            <div class="row small mb-1">
              <div class="col-sm-6"><strong>Documento:</strong> <span id="estudiante-info-documento"></span></div>
              <div class="col-sm-6"><strong>Email:</strong> <span id="estudiante-info-email"></span></div>
            </div>
            <div class="row small">
              <div class="col-sm-12"><strong>Fecha de Nacimiento:</strong> <span id="estudiante-info-fecha-nac"></span></div>
            </div>
          </div>
        </div>
        <button type="submit" id="btn-submit" class="btn btn-primary">Inscribir</button>
        <a class="btn btn-secondary" href="inscripciones.html">Volver</a>
      </form>
    </main>
  </div>
</body>
</html>
