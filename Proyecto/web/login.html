<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FCAD UNER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/login.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
  </header>
  <main class="container py-5" style="max-width: 420px;">
    <h2 class="h4 mb-3">Iniciar sesión</h2>
    <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>
    <form id="form-login">
      <div class="mb-3">
        <label class="form-label" for="nombre_usuario">Usuario</label>
        <input class="form-control" id="nombre_usuario" name="nombre_usuario" required autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label" for="contrasenia">Contraseña</label>
        <input type="password" class="form-control" id="contrasenia" name="contrasenia" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
  </main>
</body>
</html>
