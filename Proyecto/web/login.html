<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FCAD UNER</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/login.js" type="module" defer></script>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <header class="fcad-header py-3 px-4 shadow-sm bg-white">
    <h1 class="fcad-titulo h5 mb-0 fw-bold">FCAD UNER</h1>
  </header>

  <main class="container d-flex justify-content-center align-items-center flex-grow-1 py-5">
    
    <div class="card border-0 shadow-sm p-4 p-md-5" style="width: 100%; max-width: 420px; border-radius: 20px;">
      
      <div class="text-center mb-4">
        <h2 class="h3 fw-bold text-dark">Iniciar sesión</h2>
        <p class="text-muted small">Ingresá tus credenciales para acceder al sistema.</p>
      </div>

      <div id="error" class="alert alert-danger border-0 rounded-3 mb-4 text-center" style="display: none" role="alert"></div>

      <form id="form-login">
        <div class="mb-3">
          <label class="form-label fw-bold text-muted small text-uppercase" for="nombre_usuario">Usuario</label>
          <input class="form-control modern-input" id="nombre_usuario" name="nombre_usuario" required autocomplete="username" placeholder="Tu usuario">
        </div>
        
        <div class="mb-4">
          <label class="form-label fw-bold text-muted small text-uppercase" for="contrasenia">Contraseña</label>
          <input type="password" class="form-control modern-input" id="contrasenia" name="contrasenia" required autocomplete="current-password" placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-modern-primary w-100 py-2 fw-bold text-center" style="border-radius: 12px;">Entrar al sistema</button>
      </form>
      
    </div>
  </main>
</body>
</html>
