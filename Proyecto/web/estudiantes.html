<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudiantes - FCAD UNER</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/estudiantes.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4 d-flex justify-content-between align-items-center">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
    <a href="#" id="logout-link" class="text-white small">Salir</a>
  </header>
  <div class="fcad-contenedor-principal">
    <nav class="fcad-nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="inscripciones.html">Inscripciones</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="cursos.html">Cursos</a></li>
      </ul>
    </nav>
    <main class="fcad-main p-4">
      <h2 class="h4 mb-3">Estudiantes</h2>
      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>
      <form class="row g-2 mb-3" id="buscar">
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label" for="documento">Documento</label>
          <input type="text" class="form-control" id="documento" name="documento" placeholder="Documento">
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label" for="apellido">Apellido</label>
          <input type="text" class="form-control" id="apellido" name="apellido" placeholder="Apellido">
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label" for="nombres">Nombres</label>
          <input type="text" class="form-control" id="nombres" name="nombres" placeholder="Nombres">
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label" for="email">Email</label>
          <input type="text" class="form-control" id="email" name="email" placeholder="Email">
        </div>
        <div class="col-12 d-flex flex-wrap gap-2">
          <button class="btn btn-outline-primary" type="submit">Buscar</button>
          <button class="btn btn-outline-secondary" type="button" id="btn-limpiar">Limpiar</button>
        </div>
      </form>
      <div class="table-responsive">
        <table class="table table-striped">
          <thead><tr><th>Documento</th><th>Apellido</th><th>Nombres</th><th>Email</th><th></th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="d-flex justify-content-between align-items-center fcad-paginacion">
        <small class="text-muted">Página <span id="pag"></span></small>
        <div class="fcad-paginacion-btns">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-prev">Anterior</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-next">Siguiente</button>
        </div>
      </div>
      <div class="mt-3">
        <a class="btn btn-primary" href="estudiantes-nuevo.html">Nuevo estudiante</a>
      </div>
    </main>
  </div>
</body>
</html>
