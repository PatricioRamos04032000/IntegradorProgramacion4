    <main class="fcad-main">
      
      <header class="main-content-header d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4">
        <h2 class="h3 fw-bold m-0">Estudiantes</h2>
        <a class="btn btn-modern-primary d-flex align-items-center gap-2" href="estudiantes-nuevo.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
          Nuevo estudiante
        </a>
      </header>

      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>

      <form class="row g-2 mb-4 align-items-end" id="buscar">
        <div class="col-12 col-md-6 col-lg-2">
          <label class="form-label fw-bold text-muted small text-uppercase mb-1" for="documento">Documento</label>
          <input type="text" class="form-control modern-input" id="documento" name="documento" placeholder="Documento">
        </div>
        <div class="col-12 col-md-6 col-lg-2">
          <label class="form-label fw-bold text-muted small text-uppercase mb-1" for="apellido">Apellido</label>
          <input type="text" class="form-control modern-input" id="apellido" name="apellido" placeholder="Apellido">
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label fw-bold text-muted small text-uppercase mb-1" for="nombres">Nombres</label>
          <input type="text" class="form-control modern-input" id="nombres" name="nombres" placeholder="Nombres">
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <label class="form-label fw-bold text-muted small text-uppercase mb-1" for="email">Email</label>
          <input type="text" class="form-control modern-input" id="email" name="email" placeholder="Email">
        </div>
        
        <div class="col-12 col-lg-2 d-flex flex-wrap gap-2">
          <button class="btn btn-modern-primary flex-grow-1 justify-content-center" type="submit" style="padding: 0.75rem 0;">Buscar</button>
          <button class="btn btn-modern-outline flex-grow-1" type="button" id="btn-limpiar" style="padding: 0.75rem 0;">Limpiar</button>
        </div>
      </form>

      <div class="modern-table-container mb-4">
        <div class="table-responsive">
          <table class="table modern-table mb-0">
            <thead>
              <tr>
                <th>Documento</th>
                <th>Apellido</th>
                <th>Nombres</th>
                <th>Email</th>
                <th>Acciones</th> </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="fcad-paginacion d-flex justify-content-between align-items-center">
        <small class="text-muted" id="pag-info"></small>
        <div class="fcad-paginacion-btns">
          <button type="button" class="btn btn-modern-outline" id="btn-prev">Anterior</button>
          <button type="button" class="btn btn-modern-outline" id="btn-next">Siguiente</button>
        </div>
      </div>
