<body>

  <div class="fcad-contenedor-principal">
    
    <nav class="fcad-nav">
      <div class="sidebar-top">
        <div class="fcad-brand">
          <img src="fcad-logo.png" alt="FCAD Logo" class="brand-logo" />
        </div>
        <ul class="nav-links">
          <li><a href="index.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg> Inicio</a></li>
          <li><a href="inscripciones.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M9 14h6"></path><path d="M12 11v6"></path></svg> Inscripciones</a></li>
          <li><a href="estudiantes.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Estudiantes</a></li>
          <li><a href="cursos.html" class="active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg> Cursos</a></li>
        </ul>
      </div>
      <div class="sidebar-footer">
        <a href="#" id="logout-link" class="logout-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> Salir</a>

    <main class="fcad-main">
      
      <header class="main-content-header mb-4">
        <h2 class="h3 fw-bold m-0">Detalle del curso</h2>
      </header>

      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>


      <dl class="row modern-dl mb-4" id="detalle"></dl>


      <h3 class="d-flex flex-wrap gap-3 pt-4 border-top h5 fw-bold mb-3">Inscriptos</h3>
      <div class="modern-table-container mb-4">
        <div class="table-responsive">
          <table class="table modern-table mb-0">
            <thead>
              <tr>
                <th>Apellido</th>
                <th>Nombres</th>
                <th>Documento</th>
                <th>Fecha inscripción</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-inscriptos">
              <tr><td colspan="5" class="text-center py-4 text-muted">Cargando inscriptos…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-3 pt-4 border-top">
      <a class="btn btn-modern-outline d-flex align-items-center gap-2 px-4" href="cursos.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Volver
        </a>
      <a class="btn btn-modern-primary d-flex align-items-center gap-2 px-4" id="btn-editar" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
         Editar curso
        </a>
      </div>
      
    </main>
  </div>

  <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"> 
      <div class="modal-content modern-modal">
        <div class="modal-header border-0 pb-0">
          <div class="d-flex align-items-center gap-2 text-danger">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <h5 class="modal-title fw-bold" id="errorModalLabel">Error</h5>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body py-4 text-muted" id="errorModalBody"></div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-modern-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>
