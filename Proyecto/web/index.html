<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio - FCAD UNER</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/index.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4 d-flex justify-content-between align-items-center">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
    <a href="#" id="logout-link" class="text-white small">Salir</a>
  </header>
  <div class="fcad-contenedor-principal">
    <nav class="fcad-nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="inscripciones.html">Inscripciones</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="cursos.html">Cursos</a></li>
      </ul>
    </nav>
    <main class="fcad-main p-4">
      <h2 class="h4 mb-3">Panel de inicio</h2>
      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card border-primary">
            <div class="card-body">
              <p class="text-muted mb-1">Cursos activos</p>
              <p class="display-6 mb-0" id="total-cursos">Cargando…</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-success">
            <div class="card-body">
              <p class="text-muted mb-1">Estudiantes activos</p>
              <p class="display-6 mb-0" id="total-estudiantes">Cargando…</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-info">
            <div class="card-body">
              <p class="text-muted mb-1">Inscripciones activas</p>
              <p class="display-6 mb-0" id="total-inscripciones">Cargando…</p>
            </div>
          </div>
        </div>
      </div>
      <h3 class="h5">Cursos activos</h3>
      <p class="text-muted small mb-2">Ordenados por cantidad de inscriptos.</p>
      <ul class="list-group mb-3" id="lista-cursos">
        <li class="list-group-item text-muted">Cargando…</li>
      </ul>
      <div class="d-flex justify-content-between align-items-center fcad-paginacion">
        <small class="text-muted" id="pag-info"></small>
        <div class="fcad-paginacion-btns">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-prev">Anterior</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-next">Siguiente</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
