    <main class="fcad-main">
      
      <header class="main-content-header d-flex flex-wrap gap-3 justify-content-between align-items-center">
        <h2 class="h3 fw-bold m-0">Inscripciones</h2>
        <a class="btn btn-modern-primary" href="inscripciones-nueva.html">

      <div class="mb-4">

          <button class="btn btn-modern-secondary" type="submit">Buscar</button>
        </form>
      </div>

      <div class="modern-table-container mb-4">
        <div class="table-responsive">
          <table class="table modern-table mb-0">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Curso</th>
                <th>Estudiante</th>
                <th>Documento</th>
                <th>Acciones</th> </tr>
            </thead>
            <tbody id="tbody">
              </tbody>
          </table>
        </div>
      </div>

      <div class="fcad-paginacion d-flex justify-content-between align-items-center">
        <small class="text-muted" id="pag-info"></small>
        <div class="fcad-paginacion-btns">
          <button type="button" class="btn btn-modern-outline" id="btn-prev">Anterior</button>
          <button type="button" class="btn btn-modern-outline" id="btn-next">Siguiente</button>
