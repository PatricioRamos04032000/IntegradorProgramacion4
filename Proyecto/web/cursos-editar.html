<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar curso - FCAD UNER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/cursos-editar.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4 d-flex justify-content-between align-items-center">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
    <a href="#" id="logout-link" class="text-white small">Salir</a>
  </header>
  <div class="fcad-contenedor-principal">
    <nav class="fcad-nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="inscripciones.html">Inscripciones</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="cursos.html">Cursos</a></li>
      </ul>
    </nav>
    <main class="fcad-main p-4">
      <h2 class="h4 mb-3">Editar curso</h2>
      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>
      <form id="form" style="max-width: 640px;">
        <div class="mb-3">
          <label class="form-label" for="nombre">Nombre</label>
          <input class="form-control" id="nombre" name="nombre" maxlength="45" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="descripcion">Descripción</label>
          <textarea class="form-control" id="descripcion" name="descripcion" rows="3" required></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label" for="fecha_inicio">Fecha de inicio</label>
          <input type="date" class="form-control" id="fecha_inicio" name="fecha_inicio" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="cantidad_horas">Cantidad de horas</label>
          <input type="number" class="form-control" id="cantidad_horas" name="cantidad_horas" min="0" step="1" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="inscriptos_max">Máx. inscriptos</label>
          <input type="number" class="form-control" id="inscriptos_max" name="inscriptos_max" min="0" step="1" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="id_curso_estado">Estado</label>
          <select class="form-select" id="id_curso_estado" name="id_curso_estado" required></select>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a class="btn btn-secondary" href="cursos.html">Volver</a>
      </form>
    </main>
  </div>
</body>
</html>
