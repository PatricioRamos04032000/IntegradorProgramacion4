<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos - FCAD UNER</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/cursos.js" type="module" defer></script>
</head>
<body>

  <div class="fcad-contenedor-principal">
    
    <nav class="fcad-nav">
      <div class="sidebar-top">
        <div class="fcad-brand">
          <img src="fcad-logo.png" alt="FCAD Logo" class="brand-logo" />
        </div>
        
        <ul class="nav-links">
          <li>
            <a href="index.html">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
              Inicio
            </a>
          </li>
          <li>
            <a href="inscripciones.html">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M9 14h6"></path><path d="M12 11v6"></path></svg>
              Inscripciones
            </a>
          </li>
          <li>
            <a href="estudiantes.html">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
              Estudiantes
            </a>
          </li>
          <li>
            <a href="cursos.html" class="active">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
              Cursos
            </a>
          </li>
        </ul>
      </div>
      
      <div class="sidebar-footer">
        <a href="#" id="logout-link" class="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Salir
        </a>
      </div>
    </nav>

    <main class="fcad-main">
      
      <header class="main-content-header d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4">
        <h2 class="h3 fw-bold m-0">Cursos</h2>
        <a class="btn btn-modern-primary d-flex align-items-center gap-2" href="cursos-nuevo.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          Nuevo curso
        </a>
      </header>

      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>

      <form class="row g-2 mb-4 align-items-end" id="filtros">
        <div class="col-12 col-md-5">
          <label class="form-label fw-bold text-muted small text-uppercase mb-1" for="nombre">Buscar</label>
          <input type="text" class="form-control modern-input" id="nombre" name="nombre" placeholder="Nombre del curso">
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label fw-bold text-muted small text-uppercase mb-1" for="idCursoEstado">Estado</label>
          <select class="form-select modern-input" id="idCursoEstado" name="idCursoEstado"></select>
        </div>
        
        <div class="col-12 col-md-2 d-flex">
          <button type="submit" class="btn btn-modern-primary flex-grow-1 justify-content-center" style="padding: 0.75rem 0;">Filtrar</button>
          <button class="btn btn-modern-outline flex-grow-1" type="button" id="btn-limpiar" style="padding: 0.75rem 0;">Limpiar</button>
        </div>
      </form>

      <div class="modern-table-container mb-4">
        <div class="table-responsive">
          <table class="table modern-table mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Inicio</th>
                <th>Horas</th>
                <th>Max. inscriptos</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody">
              </tbody>
          </table>
        </div>
      </div>

      <div class="fcad-paginacion d-flex justify-content-between align-items-center">
        <small class="text-muted" id="pag-info"></small>
        <div class="fcad-paginacion-btns">
          <button type="button" class="btn btn-modern-outline" id="btn-prev">Anterior</button>
          <button type="button" class="btn btn-modern-outline" id="btn-next">Siguiente</button>
        </div>
      </div>
      
    </main>
  </div>

  <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"> 
      <div class="modal-content modern-modal">
        <div class="modal-header border-0 pb-0">
          <div class="d-flex align-items-center gap-2 text-danger">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <h5 class="modal-title fw-bold" id="errorModalLabel">Error</h5>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body py-4 text-muted" id="errorModalBody">
          </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-modern-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
