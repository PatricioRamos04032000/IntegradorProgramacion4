<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos - FCAD UNER</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/cursos.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4 d-flex justify-content-between align-items-center">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
    <a href="#" id="logout-link" class="text-white small">Salir</a>
  </header>
  <div class="fcad-contenedor-principal">
    <nav class="fcad-nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="inscripciones.html">Inscripciones</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="cursos.html">Cursos</a></li>
      </ul>
    </nav>
    <main class="fcad-main p-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h4 mb-0">Cursos</h2>
    <a class="btn btn-primary" href="cursos-nuevo.html">Nuevo curso</a>
  </div>
      <form class="row g-2 mb-3" id="filtros">
        <div class="col-12 col-md-4">
          <label class="form-label" for="nombre">Buscar</label>
          <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre">
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label" for="idCursoEstado">Estado</label>
          <select class="form-select" id="idCursoEstado" name="idCursoEstado"></select>
        </div>
        <div class="col-12 col-md-2 d-flex align-items-end">
          <button type="submit" class="btn btn-outline-primary w-100">Filtrar</button>
        </div>
      </form>
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Inicio</th>
              <th>Horas</th>
              <th>Max. inscriptos</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="d-flex justify-content-between align-items-center fcad-paginacion">
        <small class="text-muted" id="pag-info"></small>
        <div class="fcad-paginacion-btns">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-prev">Anterior</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-next">Siguiente</button>
        </div>
      </div>
      
    </main>
  </div>
  <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title" id="errorModalLabel">Error</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="errorModalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
