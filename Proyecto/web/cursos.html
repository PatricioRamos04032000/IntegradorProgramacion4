<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursos - FCAD UNER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <script src="js/nav.js" type="module" defer></script>
  <script src="js/cursos.js" type="module" defer></script>
</head>
<body class="bg-light">
  <header class="fcad-header py-3 px-4 d-flex justify-content-between align-items-center">
    <h1 class="fcad-titulo h4 mb-0">Cursos FCAD - UNER</h1>
    <a href="#" id="logout-link" class="text-white small">Salir</a>
  </header>
  <div class="fcad-contenedor-principal">
    <nav class="fcad-nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="inscripciones.html">Inscripciones</a></li>
        <li><a href="estudiantes.html">Estudiantes</a></li>
        <li><a href="cursos.html">Cursos</a></li>
      </ul>
    </nav>
    <main class="fcad-main p-4">
      <h2 class="h4 mb-3">Cursos</h2>
      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>
      <form class="row g-2 mb-3" id="filtros">
        <div class="col-md-4">
          <label class="form-label" for="q">Buscar</label>
          <input type="text" class="form-control" id="q" name="q" placeholder="Nombre">
        </div>
        <div class="col-md-4">
          <label class="form-label" for="estado">Estado</label>
          <select class="form-select" id="estado" name="estado"></select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button type="submit" class="btn btn-outline-primary w-100">Filtrar</button>
        </div>
      </form>
      <div class="table-responsive">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Inicio</th>
              <th>Horas</th>
              <th>Máx. inscriptos</th>
              <th>Estado</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="d-flex justify-content-between align-items-center">
        <small class="text-muted" id="pag-info"></small>
        <div>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-prev">Anterior</button>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-next">Siguiente</button>
        </div>
      </div>
      <div class="mt-3">
        <a class="btn btn-primary" href="cursos-nuevo.html">Nuevo curso</a>
      </div>
    </main>
  </div>
</body>
</html>
