      <div class="sidebar-footer">
        <a href="#" id="logout-link" class="logout-btn">

          Salir

    <main class="fcad-main">
      
      <header class="main-content-header mb-4">
        <h2 class="h3 fw-bold m-0">Nuevo curso</h2>
        <p class="text-muted mt-1">Definí los parámetros del nuevo curso a impartir.</p>
      </header>

      <div id="error" class="alert alert-danger" style="display: none" role="alert"></div>

      
        <form id="form" class="needs-validation">
          
          <div class="mb-4">
            <label class="form-label fw-bold text-muted small text-uppercase" for="nombre">Nombre</label>
            <input class="form-control modern-input" id="nombre" name="nombre" maxlength="45" placeholder="Ej: Programación Avanzada" required>
          </div>
          
          <div class="mb-4">
            <label class="form-label fw-bold text-muted small text-uppercase" for="descripcion">Descripción</label>
            <textarea class="form-control modern-input" id="descripcion" name="descripcion" rows="3" placeholder="Detalles del programa..." required></textarea>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="fechaInicio">Fecha de inicio</label>
              <input type="date" class="form-control modern-input" id="fechaInicio" name="fechaInicio" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="cantidadHoras">Cantidad de horas</label>
              <input type="number" class="form-control modern-input" id="cantidadHoras" name="cantidadHoras" min="0" step="1" placeholder="Ej: 60" required>
            </div>
          </div>

          <div class="row g-4 mb-5">
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="inscriptosMax">Max. inscriptos</label>
              <input type="number" class="form-control modern-input" id="inscriptosMax" name="inscriptosMax" min="0" step="1" placeholder="Ej: 30" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold text-muted small text-uppercase" for="idCursoEstado">Estado</label>
              <select class="form-select modern-input" id="idCursoEstado" name="idCursoEstado" required></select>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-3 pt-4 border-top">
            <button type="submit" class="btn btn-modern-primary d-flex align-items-center justify-content-center gap-2 px-4">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
              Crear curso
            </button>
            <a class="btn btn-modern-outline d-flex align-items-center gap-2 px-4" href="cursos.html">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
              Cancelar
            </a>
          </div>

        </form>


    </main>
  </div>

  <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered"> 
      <div class="modal-content modern-modal">
        <div class="modal-header border-0 pb-0">
          <div class="d-flex align-items-center gap-2 text-danger">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <h5 class="modal-title fw-bold" id="errorModalLabel">Error</h5>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body py-4 text-muted" id="errorModalBody"></div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-modern-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
